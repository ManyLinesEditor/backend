name: Deploy Doc2Go to GitHub pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    env:
      OUTPUT_DIR: _site
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Install doc2go
        run: go install go.abhg.dev/doc2go@latest

      - name: Generate API reference
        run: doc2go -internal -out ${{ env.OUTPUT_DIR }} -subdir api ./...

      - name: Flatten doc2go structure
        run: |
          MODULE=$(go list -m)
          OUTPUT_DIR="${{ env.OUTPUT_DIR }}"

          mv "$OUTPUT_DIR/api/$MODULE"/* "$OUTPUT_DIR"/
          rm -rf "$OUTPUT_DIR/api/$MODULE"

      - name: Upload pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
    

    